services:
  postgres:
    image: postgres:16-alpine
    container_name: muvit-postgres
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 768m
    environment:
      POSTGRES_USER: muvit
      POSTGRES_PASSWORD: muvit
      POSTGRES_DB: muvit
    ports:
      - "5432:5432"
    volumes:
      - muvit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muvit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: muvit-redis
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 256m
    ports:
      - "6379:6379"
    volumes:
      - muvit_redis_data:/data

volumes:
  muvit_pg_data:
  muvit_redis_data:
