name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: muvit
          POSTGRES_PASSWORD: muvit
          POSTGRES_DB: muvit_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U muvit"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://muvit:muvit@localhost:5432/muvit_test
      JWT_SECRET: ci-secret-ci-secret-ci-secret-32
      WEB_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @muvit/db migrate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm -r test
      - run: pnpm build
